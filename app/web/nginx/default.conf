server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;
    absolute_redirect off;

    set $csp_sources "default-src 'self'; connect-src 'self'; img-src 'self' data:";
    set $csp_content "object-src 'none'; script-src 'self'; style-src 'self'";
    set $csp_navigation "base-uri 'self'; form-action 'self'; frame-ancestors 'none'";
    add_header Content-Security-Policy "$csp_sources; $csp_content; $csp_navigation" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        return 302 /dev/;
    }

    location ~ ^/(dev|test|perf|staging|production)$ {
        return 308 /$1/;
    }

    include /etc/nginx/conf.d/portfolio-api.inc;

    location ~ ^/(dev|test|perf|staging|production)/$ {
        try_files /index.html =404;
    }

    location ~ ^/(dev|test|perf|staging|production)/(.+\.(?:css|js))$ {
        try_files /$2 =404;
        expires 1h;
    }

    location ~ ^/(dev|test|perf|staging|production)/(.*)$ {
        try_files /$2 /index.html =404;
    }

    location / {
        return 404;
    }
}
