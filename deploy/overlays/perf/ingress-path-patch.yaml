apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio
spec:
  rules:
    - http:
        paths:
          - path: /perf/api
            pathType: Prefix
            backend:
              service:
                name: portfolio-api
                port:
                  number: 8000
          - path: /perf
            pathType: Prefix
            backend:
              service:
                name: portfolio-web
                port:
                  number: 8080
