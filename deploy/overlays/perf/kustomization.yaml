apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: portfolio-perf

resources:
  - ../../base
  - ../../platform/alicloud-alb/ingress
  - api-hpa.yaml

patches:
  - path: api-environment-patch.yaml
  - path: ingress-path-patch.yaml

labels:
  - pairs:
      app.kubernetes.io/instance: portfolio-perf
      environment: perf
    includeSelectors: false
    includeTemplates: true

replicas:
  - name: portfolio-web
    count: 2
