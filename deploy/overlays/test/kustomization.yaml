apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: portfolio-test

resources:
  - ../../base
  - namespace.yaml

patches:
  - path: api-environment-patch.yaml

labels:
  - pairs:
      app.kubernetes.io/instance: portfolio-test
      environment: test
    includeSelectors: false
    includeTemplates: true
