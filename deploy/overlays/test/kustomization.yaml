apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: portfolio-test

resources:
  - ../../base
  - ../../platform/alicloud-alb/ingress
  - namespace.yaml

patches:
  - path: api-environment-patch.yaml
  - path: ingress-path-patch.yaml

labels:
  - pairs:
      app.kubernetes.io/instance: portfolio-test
      environment: test
    includeSelectors: false
    includeTemplates: true

replicas:
  - name: portfolio-api
    count: 1
  - name: portfolio-web
    count: 1
