name: Service CI

on:
  pull_request:
    branches:
      - main
  merge_group:
  push:
    branches:
      - main
    paths:
      - "app/api/**"
      - "app/web/**"
      - "compose.yaml"
      - ".github/workflows/service-ci.yaml"
      - "scripts/render-*.sh"
      - "scripts/*-acs-kubeconfig.sh"
      - "deploy/**"
      - "scripts/validate-kubernetes.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: service-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-quality:
    name: API quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    defaults:
      run:
        working-directory: app/api

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.10"
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: app/api/uv.lock
          working-directory: app/api

      - name: Synchronize dependencies
        run: uv sync --frozen --all-groups

      - name: Lint
        run: uv run --frozen ruff check portfolio_api tests migrations

      - name: Check formatting
        run: uv run --frozen ruff format --check portfolio_api tests migrations

      - name: Run tests
        run: uv run --frozen pytest -q

      - name: Run type checking
        run: uv run --frozen mypy portfolio_api migrations

  web-quality:
    name: Web quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    defaults:
      run:
        working-directory: app/web

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run checks
        run: npm run check

  kubernetes-manifests:
    name: Kubernetes manifests
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: v1.34.2

      - name: Validate Kubernetes manifests
        run: ./scripts/validate-kubernetes.sh

      - name: Validate temporary ACS kubeconfig helper
        run: ./scripts/test-write-acs-kubeconfig.sh

  container-images:
    name: Container image / ${{ matrix.component }}
    needs:
      - api-quality
      - web-quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: app/api
            image: portfolio-api
            container_port: 8000
            host_port: 18000
            health_path: /dev/api/health/live
            expected_user: "10001:10001"
          - component: web
            context: app/web
            image: portfolio-web
            container_port: 8080
            host_port: 18080
            health_path: /healthz
            expected_user: "101:101"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Check Dockerfile
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          call: check

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: false
          load: true
          pull: true
          tags: local/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Smoke-test image
        shell: bash
        env:
          IMAGE_REF: local/${{ matrix.image }}:${{ github.sha }}
          CONTAINER_NAME: portfolio-${{ matrix.component }}-smoke
          CONTAINER_PORT: ${{ matrix.container_port }}
          HOST_PORT: ${{ matrix.host_port }}
          HEALTH_PATH: ${{ matrix.health_path }}
          EXPECTED_USER: ${{ matrix.expected_user }}
        run: |
          set -Eeuo pipefail

          cleanup() {
            docker rm --force "${CONTAINER_NAME}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          docker run \
            --detach \
            --name "${CONTAINER_NAME}" \
            --publish "127.0.0.1:${HOST_PORT}:${CONTAINER_PORT}" \
            "${IMAGE_REF}"

          for attempt in {1..30}; do
            if curl \
              --fail \
              --silent \
              "http://127.0.0.1:${HOST_PORT}${HEALTH_PATH}" \
              >/dev/null; then
              break
            fi

            if [[ "${attempt}" -eq 30 ]]; then
              docker logs "${CONTAINER_NAME}"
              exit 1
            fi

            sleep 1
          done

          actual_user="$(
            docker inspect \
              --format '{{.Config.User}}' \
              "${CONTAINER_NAME}"
          )"

          if [[ "${actual_user}" != "${EXPECTED_USER}" ]]; then
            printf \
              'unexpected image user: expected %s, found %s\n' \
              "${EXPECTED_USER}" \
              "${actual_user}" \
              >&2
            exit 1
          fi

      - name: Scan image for fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: "v0.70.0"
          image-ref: local/${{ matrix.image }}:${{ github.sha }}
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"
