name: Service Delivery

on:
  workflow_run:
    workflows:
      - Service CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: service-image-publish
  cancel-in-progress: false

jobs:
  publish-images:
    name: Publish image / ${{ matrix.component }}
    if: >-
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main')
    environment:
      name: image-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            context: app/api
            image: portfolio-api
            container_port: 8000
            host_port: 18000
            health_path: /dev/api/health/live
            expected_user: "10001:10001"
          - component: web
            context: app/web
            image: portfolio-web
            container_port: 8080
            host_port: 18080
            health_path: /healthz
            expected_user: "101:101"

    steps:
      - name: Check out trusted main revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: >-
            ${{ github.event_name == 'workflow_run'
                && github.event.workflow_run.head_sha
                || github.sha }}
          persist-credentials: false

      - name: Resolve source revision
        id: source
        shell: bash
        run: |
          set -Eeuo pipefail

          sha="$(git rev-parse HEAD)"
          [[ "${sha}" =~ ^[0-9a-f]{40}$ ]]
          printf 'sha=%s\n' "${sha}" >> "${GITHUB_OUTPUT}"

      - name: Validate ACR configuration
        shell: bash
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
        run: |
          set -Eeuo pipefail

          [[ -n "${ACR_REGISTRY}" ]]
          [[ "${ACR_REGISTRY}" != *"://"* ]]
          [[ "${ACR_REGISTRY}" != */* ]]
          [[ "${ACR_REGISTRY}" == *.aliyuncs.com ]]
          [[ "${ACR_NAMESPACE}" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]]
          [[ -n "${ACR_USERNAME}" ]]

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Check Dockerfile
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          call: check

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: false
          load: true
          pull: true
          tags: local/${{ matrix.image }}:${{ steps.source.outputs.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Smoke-test image
        shell: bash
        env:
          IMAGE_REF: local/${{ matrix.image }}:${{ steps.source.outputs.sha }}
          CONTAINER_NAME: portfolio-${{ matrix.component }}-publish-smoke
          CONTAINER_PORT: ${{ matrix.container_port }}
          HOST_PORT: ${{ matrix.host_port }}
          HEALTH_PATH: ${{ matrix.health_path }}
          EXPECTED_USER: ${{ matrix.expected_user }}
        run: |
          set -Eeuo pipefail

          cleanup() {
            docker rm --force "${CONTAINER_NAME}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          docker run \
            --detach \
            --name "${CONTAINER_NAME}" \
            --publish "127.0.0.1:${HOST_PORT}:${CONTAINER_PORT}" \
            "${IMAGE_REF}"

          for attempt in {1..30}; do
            if curl \
              --fail \
              --silent \
              "http://127.0.0.1:${HOST_PORT}${HEALTH_PATH}" \
              >/dev/null; then
              break
            fi

            if [[ "${attempt}" -eq 30 ]]; then
              docker logs "${CONTAINER_NAME}"
              exit 1
            fi

            sleep 1
          done

          actual_user="$(
            docker inspect \
              --format '{{.Config.User}}' \
              "${CONTAINER_NAME}"
          )"

          if [[ "${actual_user}" != "${EXPECTED_USER}" ]]; then
            printf \
              'unexpected image user: expected %s, found %s\n' \
              "${EXPECTED_USER}" \
              "${actual_user}" \
              >&2
            exit 1
          fi

      - name: Scan image for fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: "v0.70.0"
          image-ref: local/${{ matrix.image }}:${{ steps.source.outputs.sha }}
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Log in to ACR Personal
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ vars.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push scanned image
        id: publish
        shell: bash
        env:
          SOURCE_IMAGE: local/${{ matrix.image }}:${{ steps.source.outputs.sha }}
          TARGET_REPOSITORY: ${{ vars.ACR_REGISTRY }}/${{ vars.ACR_NAMESPACE }}/${{ matrix.image }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          COMPONENT: ${{ matrix.component }}
        run: |
          set -Eeuo pipefail

          target="${TARGET_REPOSITORY}:${SOURCE_SHA}"

          docker tag "${SOURCE_IMAGE}" "${target}"
          docker push "${target}"

          digest="$(
            docker buildx imagetools inspect \
              "${target}" \
              --format "{{json .Manifest.Digest}}" |
              tr -d '"'
          )"

          [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]

          image_ref="${TARGET_REPOSITORY}@${digest}"

          printf 'image_ref=%s\n' "${image_ref}" >> "${GITHUB_OUTPUT}"
          printf '%s\n' "${image_ref}" \
            > "${RUNNER_TEMP}/${COMPONENT}-image-ref.txt"

          printf \
            '### %s image\n\n%s\n' \
            "${COMPONENT}" \
            "${image_ref}" \
            >> "${GITHUB_STEP_SUMMARY}"

      - name: Preserve immutable image reference
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: service-image-${{ matrix.component }}-${{ steps.source.outputs.sha }}
          path: ${{ runner.temp }}/${{ matrix.component }}-image-ref.txt
          if-no-files-found: error
          retention-days: 30

  verify-image-set:
    name: Verify immutable image set
    needs:
      - publish-images
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    outputs:
      source_sha: ${{ steps.verify.outputs.source_sha }}
      api_image: ${{ steps.verify.outputs.api_image }}
      web_image: ${{ steps.verify.outputs.web_image }}

    steps:
      - name: Download image references
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: service-image-*
          path: ${{ runner.temp }}/image-refs
          merge-multiple: true
          digest-mismatch: error

      - name: Verify image set
        id: verify
        shell: bash
        env:
          SOURCE_SHA: >-
            ${{ github.event_name == 'workflow_run'
                && github.event.workflow_run.head_sha
                || github.sha }}
          IMAGE_REF_DIR: ${{ runner.temp }}/image-refs
        run: |
          set -Eeuo pipefail

          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]

          api_file="${IMAGE_REF_DIR}/api-image-ref.txt"
          web_file="${IMAGE_REF_DIR}/web-image-ref.txt"

          [[ -f "${api_file}" ]]
          [[ -f "${web_file}" ]]

          file_count="$(
            find "${IMAGE_REF_DIR}" \
              -maxdepth 1 \
              -type f \
              -name '*-image-ref.txt' |
              wc -l
          )"
          [[ "${file_count}" -eq 2 ]]

          api_image="$(< "${api_file}")"
          web_image="$(< "${web_file}")"

          registry_pattern='[a-z0-9.-]+\.aliyuncs\.com'
          namespace_pattern='[a-z0-9]+([._-][a-z0-9]+)*'
          digest_pattern='sha256:[0-9a-f]{64}'

          api_pattern="^${registry_pattern}/${namespace_pattern}/"
          api_pattern+="portfolio-api@${digest_pattern}$"
          web_pattern="^${registry_pattern}/${namespace_pattern}/"
          web_pattern+="portfolio-web@${digest_pattern}$"

          [[ "${api_image}" =~ ${api_pattern} ]]
          [[ "${web_image}" =~ ${web_pattern} ]]

          api_location="${api_image%/portfolio-api@*}"
          web_location="${web_image%/portfolio-web@*}"
          [[ "${api_location}" == "${web_location}" ]]

          {
            printf 'source_sha=%s\n' "${SOURCE_SHA}"
            printf 'api_image=%s\n' "${api_image}"
            printf 'web_image=%s\n' "${web_image}"
          } >> "${GITHUB_OUTPUT}"

          release_manifest="${RUNNER_TEMP}/service-release.env"

          {
            printf 'SOURCE_SHA=%s\n' "${SOURCE_SHA}"
            printf 'API_IMAGE=%s\n' "${api_image}"
            printf 'WEB_IMAGE=%s\n' "${web_image}"
          } > "${release_manifest}"

          printf \
            '### Verified image set\n\n- Source: %s\n- API: %s\n- Web: %s\n' \
            "${SOURCE_SHA}" \
            "${api_image}" \
            "${web_image}" \
            >> "${GITHUB_STEP_SUMMARY}"

      - name: Preserve release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: service-release-${{ steps.verify.outputs.source_sha }}
          path: ${{ runner.temp }}/service-release.env
          if-no-files-found: error
          retention-days: 30
