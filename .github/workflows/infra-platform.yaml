name: Infrastructure Delivery

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-platform
  cancel-in-progress: false

jobs:
  plan:
    name: Plan platform
    environment:
      name: infra-plan
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      artifact_sha256: ${{ steps.package.outputs.artifact_sha256 }}
      has_changes: ${{ steps.plan.outputs.has_changes }}
      source_sha: ${{ steps.source.outputs.source_sha }}

    env:
      TF_IN_AUTOMATION: "1"
      TF_INPUT: "0"
      TF_DATA_DIR: >-
        /tmp/portfolio-terraform-data-${{ github.run_id }}-${{ github.run_attempt }}
      ALIBABA_CLOUD_REGION_ID: ${{ vars.ALIBABA_CLOUD_REGION }}
      ALIBABA_CLOUD_IGNORE_PROFILE: "TRUE"

    steps:
      - name: Check out trusted main revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Validate trusted invocation and identity configuration
        id: source
        shell: bash
        env:
          OIDC_PROVIDER_ARN: ${{ vars.ALIBABA_CLOUD_OIDC_PROVIDER_ARN }}
          TERRAFORM_ROLE_ARN: ${{ vars.ALIBABA_CLOUD_ROLE_ARN }}
        run: |
          set -Eeuo pipefail

          [[ "${GITHUB_REF}" == "refs/heads/main" ]]
          [[ "${GITHUB_SHA}" =~ ^[0-9a-f]{40}$ ]]
          [[ "$(git rev-parse HEAD)" == "${GITHUB_SHA}" ]]

          if [[ "${OIDC_PROVIDER_ARN}" =~ ^acs:ram::([0-9]+):oidc-provider/[^[:space:]]+$ ]]; then
            provider_account_id="${BASH_REMATCH[1]}"
          else
            printf 'invalid Alibaba Cloud OIDC provider ARN\n' >&2
            exit 1
          fi

          if [[ "${TERRAFORM_ROLE_ARN}" =~ ^acs:ram::([0-9]+):role/[^[:space:]]+$ ]]; then
            role_account_id="${BASH_REMATCH[1]}"
          else
            printf 'invalid Alibaba Cloud Terraform role ARN\n' >&2
            exit 1
          fi

          [[ "${provider_account_id}" == "${role_account_id}" ]]
          printf 'source_sha=%s\n' "${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.7"
          terraform_wrapper: false

      - name: Render validated platform configuration
        shell: bash
        env:
          TERRAFORM_STATE_BUCKET: ${{ vars.TERRAFORM_STATE_BUCKET }}
          TERRAFORM_STATE_TABLESTORE_ENDPOINT: ${{ vars.TERRAFORM_STATE_TABLESTORE_ENDPOINT }}
          TERRAFORM_STATE_TABLESTORE_TABLE: ${{ vars.TERRAFORM_STATE_TABLESTORE_TABLE }}
          TERRAFORM_PLATFORM_VSWITCHES: ${{ vars.TERRAFORM_PLATFORM_VSWITCHES }}
          TERRAFORM_KUBERNETES_VERSION: ${{ vars.TERRAFORM_KUBERNETES_VERSION }}
        run: |
          set -Eeuo pipefail

          ./scripts/render-terraform-platform-config.sh \
            "${RUNNER_TEMP}/terraform-platform-config"

      - name: Validate encrypted-plan secret
        shell: bash
        env:
          TERRAFORM_PLAN_PASSPHRASE: ${{ secrets.TERRAFORM_PLAN_PASSPHRASE }}
        run: |
          set -Eeuo pipefail

          [[ "${#TERRAFORM_PLAN_PASSPHRASE}" -ge 32 ]]
          [[ "${TERRAFORM_PLAN_PASSPHRASE}" != *$'\n'* ]]
          [[ "${TERRAFORM_PLAN_PASSPHRASE}" != *$'\r'* ]]

      - name: Configure temporary Alibaba Cloud credentials
        uses: aliyun/configure-aliyun-credentials-action@1e5248c8d5d93a8781ac344a68e19a43341e79e6 # v1.1.0
        with:
          oidc-provider-arn: ${{ vars.ALIBABA_CLOUD_OIDC_PROVIDER_ARN }}
          role-to-assume: ${{ vars.ALIBABA_CLOUD_ROLE_ARN }}
          role-session-name: gha-terraform-plan-${{ github.run_id }}
          role-session-expiration: "3600"
          audience: sts.aliyuncs.com

      - name: Initialize remote backend
        shell: bash
        run: |
          set -Eeuo pipefail

          terraform -chdir=infra/platform init \
            -input=false \
            -lockfile=readonly \
            -no-color \
            -reconfigure \
            -backend-config="${RUNNER_TEMP}/terraform-platform-config/backend.hcl"

      - name: Validate platform configuration
        run: terraform -chdir=infra/platform validate -no-color

      - name: Create saved platform plan
        id: plan
        shell: bash
        run: |
          set -Eeuo pipefail

          plan_file="${RUNNER_TEMP}/platform.tfplan"

          set +e
          terraform -chdir=infra/platform plan \
            -detailed-exitcode \
            -input=false \
            -lock-timeout=5m \
            -no-color \
            -out="${plan_file}" \
            -var-file="${RUNNER_TEMP}/terraform-platform-config/terraform.tfvars.json"
          plan_exit_code="$?"
          set -e

          case "${plan_exit_code}" in
            0)
              has_changes=false
              ;;
            2)
              has_changes=true
              ;;
            *)
              printf \
                'terraform plan failed with exit code %s\n' \
                "${plan_exit_code}" \
                >&2
              exit "${plan_exit_code}"
              ;;
          esac

          [[ -s "${plan_file}" ]]
          printf 'has_changes=%s\n' "${has_changes}" >> "${GITHUB_OUTPUT}"

      - name: Summarize and guard platform plan
        shell: bash
        env:
          PLAN_FILE: ${{ runner.temp }}/platform.tfplan
        run: |
          set -Eeuo pipefail

          summary_file="${RUNNER_TEMP}/terraform-plan-summary.json"

          terraform -chdir=infra/platform show -json "${PLAN_FILE}" |
            jq '
              def actions: [.resource_changes[]?.change.actions];

              actions as $actions |
              {
                create: (
                  [$actions[] | select(. == ["create"])] |
                  length
                ),
                update: (
                  [$actions[] | select(. == ["update"])] |
                  length
                ),
                replace: (
                  [
                    $actions[] |
                    select(
                      (index("create") != null) and
                      (index("delete") != null)
                    )
                  ] |
                  length
                ),
                delete: (
                  [$actions[] | select(. == ["delete"])] |
                  length
                )
              }
            ' > "${summary_file}"

          create_count="$(jq --raw-output '.create' "${summary_file}")"
          update_count="$(jq --raw-output '.update' "${summary_file}")"
          replace_count="$(jq --raw-output '.replace' "${summary_file}")"
          delete_count="$(jq --raw-output '.delete' "${summary_file}")"

          {
            printf '### Terraform platform plan\n\n'
            printf '| Action | Count |\n'
            printf '| --- | ---: |\n'
            printf '| Create | %s |\n' "${create_count}"
            printf '| Update | %s |\n' "${update_count}"
            printf '| Replace | %s |\n' "${replace_count}"
            printf '| Delete | %s |\n\n' "${delete_count}"
            printf 'Source commit: %s\n' "${GITHUB_SHA}"
          } >> "${GITHUB_STEP_SUMMARY}"

          if (( replace_count > 0 || delete_count > 0 )); then
            printf \
              'destructive plan rejected: replace=%s delete=%s\n' \
              "${replace_count}" \
              "${delete_count}" \
              >&2
            exit 1
          fi

      - name: Encrypt saved plan
        id: package
        shell: bash
        env:
          TERRAFORM_PLAN_PASSPHRASE: ${{ secrets.TERRAFORM_PLAN_PASSPHRASE }}
        run: |
          set -Eeuo pipefail
          umask 077

          config_dir="${RUNNER_TEMP}/terraform-platform-config"
          plan_file="${RUNNER_TEMP}/platform.tfplan"
          bundle_dir="${RUNNER_TEMP}/terraform-platform-plan-bundle"
          archive_file="${RUNNER_TEMP}/terraform-platform-plan.tar"
          encrypted_file="${RUNNER_TEMP}/terraform-platform-plan.enc"
          artifact_name="terraform-platform-plan-"
          artifact_name+="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          mkdir -- "${bundle_dir}"

          install -m 600 \
            "${plan_file}" \
            "${bundle_dir}/platform.tfplan"

          install -m 600 \
            "${config_dir}/backend.hcl" \
            "${bundle_dir}/backend.hcl"

          install -m 600 \
            "${config_dir}/terraform.tfvars.json" \
            "${bundle_dir}/terraform.tfvars.json"

          plan_sha256="$(
            sha256sum "${bundle_dir}/platform.tfplan" |
              cut -d ' ' -f 1
          )"
          backend_sha256="$(
            sha256sum "${bundle_dir}/backend.hcl" |
              cut -d ' ' -f 1
          )"
          variables_sha256="$(
            sha256sum "${bundle_dir}/terraform.tfvars.json" |
              cut -d ' ' -f 1
          )"
          terraform_version="$(
            terraform version -json |
              jq --raw-output '.terraform_version'
          )"

          jq \
            --null-input \
            --arg source_sha "${GITHUB_SHA}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg terraform_version "${terraform_version}" \
            --arg plan_sha256 "${plan_sha256}" \
            --arg backend_sha256 "${backend_sha256}" \
            --arg variables_sha256 "${variables_sha256}" \
            '{
              source_sha: $source_sha,
              run_id: $run_id,
              run_attempt: $run_attempt,
              terraform_version: $terraform_version,
              plan_sha256: $plan_sha256,
              backend_sha256: $backend_sha256,
              variables_sha256: $variables_sha256
            }' \
            > "${bundle_dir}/metadata.json"

          tar \
            --create \
            --file "${archive_file}" \
            --directory "${bundle_dir}" \
            .

          openssl enc \
            -aes-256-cbc \
            -pbkdf2 \
            -iter 200000 \
            -md sha256 \
            -salt \
            -pass env:TERRAFORM_PLAN_PASSPHRASE \
            -in "${archive_file}" \
            -out "${encrypted_file}"

          artifact_sha256="$(
            sha256sum "${encrypted_file}" |
              cut -d ' ' -f 1
          )"

          [[ "${artifact_sha256}" =~ ^[0-9a-f]{64}$ ]]

          {
            printf 'artifact_name=%s\n' "${artifact_name}"
            printf 'artifact_sha256=%s\n' "${artifact_sha256}"
          } >> "${GITHUB_OUTPUT}"

          printf \
            '\nEncrypted plan SHA-256: %s\n' \
            "${artifact_sha256}" \
            >> "${GITHUB_STEP_SUMMARY}"

          rm -rf -- "${bundle_dir}"
          rm -f -- "${archive_file}" "${plan_file}"

      - name: Preserve encrypted saved plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ runner.temp }}/terraform-platform-plan.enc
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Remove local plan material
        if: always()
        shell: bash
        run: |
          rm -rf -- \
            "${TF_DATA_DIR}" \
            "${RUNNER_TEMP}/terraform-platform-config" \
            "${RUNNER_TEMP}/terraform-platform-plan-bundle"

          rm -f -- \
            "${RUNNER_TEMP}/platform.tfplan" \
            "${RUNNER_TEMP}/terraform-platform-plan.tar" \
            "${RUNNER_TEMP}/terraform-platform-plan.enc" \
            "${RUNNER_TEMP}/terraform-plan-summary.json"
